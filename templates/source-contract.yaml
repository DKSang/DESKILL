# Source Contract — Machine-verifiable data source agreement
# Generate one file per source: contracts/source-<name>.yaml

apiVersion: datacontract.com/v1.0.0
kind: DataContract
metadata:
  name: <source-name>              # e.g. "stripe-payments"
  version: 1.0.0
  owner: <team-or-person>          # Who is responsible for this source
  lastVerified: <ISO-date>         # Date last tested with a live call

info:
  title: <Source Display Name>     # e.g. "Stripe Payments API"
  description: <One-line description of the source>
  purpose: <What this source enables>

servers:
  production:
    type: <api|s3|postgres|snowflake|bigquery|kafka>
    # Connection details (tool-specific)
    # API: url, authType, rateLimit
    # S3: bucket, prefix, region
    # DB: host, database, schema

terms:
  usage: <Allowed use cases>
  limitations: <Restrictions on use>
  cost: <$0 or actual cost>
  license: <Link to license if applicable>

schema:
  type: object
  properties:
    <field-name>:
      type: <string|integer|number|boolean|datetime|date>
      description: <Human-readable description>
      required: <true|false>
      unique: <true|false>
      pii: <true|false>
      piiClassification: <direct|indirect|none>
      example: <example-value>
      enum:                              # For categorical fields
        - <value1>
        - <value2>

    # Repeat for each field
    # id:
    #   type: string
    #   required: true
    #   unique: true
    #   pii: false

  required:
    - <field-name>                     # List of required fields

quality:
  type: <great-expectations|dbt|soda>
  checks:
    - row_count > 0
    - missing_count(<pk-field>) = 0
    - duplicate_count(<pk-field>) = 0
    - freshness(<timestamp-field>) < 24h
    - <custom-check>

sla:
  availability: <e.g. "99.9%">
  freshness: <e.g. "1 hour">         # Max age of data
  latency: <e.g. "5 minutes">         # Max time from event to available
  retention: <e.g. "90 days">         # How long data is kept
